<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XYZ Meeting – Module Nhân viên</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <!-- ═══ SIDEBAR ═══════════════════════════════════ -->
  <div class="sidebar">
    <div class="brand">
      <div class="brand-mark">XYZ</div>
      <div>
        <h1>XYZ Company</h1>
        <p>Quản lý họp</p>
      </div>
    </div>
    <div class="nav">
      <a href="#" data-view="dashboard" class="nav-link">
        <span class="icon">🏠</span> Dashboard
      </a>
      <a href="#" data-view="my-meetings" class="nav-link">
        <span class="icon">📅</span> Quản lý cuộc họp
      </a>
      <a href="#" data-view="create" class="nav-link">
        <span class="icon">➕</span> Tạo cuộc họp
      </a>
      <a href="#" data-view="dashboard-created" class="nav-link">
        <span class="icon">🗂️</span> Cuộc họp đã tạo
      </a>
      <a href="#" data-view="profile" class="nav-link">
        <span class="icon">👤</span> Hồ sơ cá nhân
      </a>
    </div>
    <div class="sidebar-bottom">
      <a href="#" id="changePwBtn"><span class="icon">🔒</span> Đổi mật khẩu</a>
      <a href="#" id="logoutBtn" class="danger"><span class="icon">↩️</span> Đăng xuất</a>
    </div>
  </div>

  <!-- ═══ MAIN ════════════════════════════════════════ -->
  <div class="main">

    <!-- Top bar -->
    <div class="topbar">
      <div class="search">
        🔍 <input id="globalSearch" type="text" placeholder="Tìm kiếm cuộc họp...">
      </div>
      <button class="bell-btn" id="bellBtn" title="Thông báo">🔔<span class="dot"></span></button>
      <div class="user">
        <div style="text-align:right;">
          <div class="name">Nguyễn Văn A</div>
          <div class="role">Quản lý dự án</div>
        </div>
        <div class="avatar">NA</div>
      </div>
    </div>

    <!-- Nội dung sẽ được render bởi router -->
    <div class="content" id="content"></div>

  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<!-- ═══ SCRIPTS (thứ tự quan trọng) ═══════════════════ -->
<script src="js/utils.js"></script>
<script src="js/data.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/form.js"></script>
<script src="js/detail.js"></script>
<script src="js/profile.js"></script>
<script src="js/router.js"></script>
<script>
  // Khởi động ứng dụng
  getMeetings();   // seed nếu localStorage trống
  initRouter();    // gắn sự kiện sidebar / search
  navigate("dashboard"); // render trang đầu tiên
</script>

</body>
</html>
